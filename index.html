<html>
<body>
<div id="splash-screen">
        <div id="typewriter-wrap">
            <span id="typewriter-text"></span><span class="cursor"></span>
        </div>
        <button id="start-btn">START HEIST</button>
    </div>

    <button id="fullscreen-toggle">FULLSCREEN</button>
    <marquee scrollamount="12">
        Created by Ruchir. Subscribe to him <a href="https://youtube.com/@powergamerzalt" target="_blank">here!</a>
    </marquee>

    <div id="flash-container"></div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

    <script>
        const messages = [
            "INITIALIZING HEIST PROTOCOL...",
            "CALCULATING PROBABILITY OF FAILURE: 99%...",
            "BRIBING THE MUSEUM GUARDS...",
            "POLISHING THE TUNISIAN DIAMOND...",
            "GATHERING STICK-FIGURE ASSETS...",
            "LOCATING THE TELEPORTER...",
            "PREPARING THE FAIL SCREENS..."
            "hi. power here. if you are reading this, ur wasting ur time 🤣"
        ];

        const textElement = document.getElementById("typewriter-text");
        const startBtn = document.getElementById("start-btn");
        const splash = document.getElementById("splash-screen");
        
        const randomMessage = messages[Math.floor(Math.random() * messages.length)];
        let charIndex = 0;

        function runTypewriter() {
            if (charIndex < randomMessage.length) {
                textElement.innerText += randomMessage.charAt(charIndex);
                charIndex++;
                setTimeout(runTypewriter, 50); 
            } else {
                startBtn.style.display = "block";
            }
        }

        window.onload = () => {
            runTypewriter();

            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            document.getElementById("flash-container").appendChild(player);

            startBtn.onclick = () => {
                splash.style.opacity = '0';
                setTimeout(() => splash.remove(), 800);

                player.load({
                    url: "Stealing_the_Diamond.swf",
                    letterbox: "on",
                    scale: "showAll",
                    allowFullscreen: true,
                    autoplay: "on"
                });
            };

            document.getElementById("fullscreen-toggle").onclick = () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                } else {
                    document.exitFullscreen();
                }
            };
        };
    </script>
</body>
</html>
